# Railway-compatible Docker Compose
# For local development that mimics Railway environment

version: '3.8'

services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: haland-petcare-app
    ports:
      - "8000:8000"
    environment:
      - APP_ENV=local
      - APP_DEBUG=true
      - APP_URL=http://localhost:8000
      - DB_CONNECTION=pgsql
      - DB_HOST=db
      - DB_PORT=5432
      - DB_DATABASE=haland_petcare
      - DB_USERNAME=postgres
      - DB_PASSWORD=secret
      - QUEUE_CONNECTION=database
      - SESSION_DRIVER=database
      - CACHE_STORE=database
    volumes:
      - .:/app
      - ./storage:/app/storage
      - ./bootstrap/cache:/app/bootstrap/cache
    depends_on:
      db:
        condition: service_healthy
    networks:
      - haland-network
    restart: unless-stopped

  db:
    image: postgres:14-alpine
    container_name: haland-petcare-db
    ports:
      - "5432:5432"
    environment:
      POSTGRES_DB: haland_petcare
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: secret
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - haland-network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  queue:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: haland-petcare-queue
    command: php artisan queue:work --sleep=3 --tries=3 --max-time=3600
    environment:
      - APP_ENV=local
      - APP_DEBUG=true
      - DB_CONNECTION=pgsql
      - DB_HOST=db
      - DB_PORT=5432
      - DB_DATABASE=haland_petcare
      - DB_USERNAME=postgres
      - DB_PASSWORD=secret
      - QUEUE_CONNECTION=database
    volumes:
      - .:/app
      - ./storage:/app/storage
      - ./bootstrap/cache:/app/bootstrap/cache
    depends_on:
      db:
        condition: service_healthy
    networks:
      - haland-network
    restart: unless-stopped

  scheduler:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: haland-petcare-scheduler
    command: php artisan schedule:work
    environment:
      - APP_ENV=local
      - APP_DEBUG=true
      - DB_CONNECTION=pgsql
      - DB_HOST=db
      - DB_PORT=5432
      - DB_DATABASE=haland_petcare
      - DB_USERNAME=postgres
      - DB_PASSWORD=secret
      - QUEUE_CONNECTION=database
    volumes:
      - .:/app
      - ./storage:/app/storage
      - ./bootstrap/cache:/app/bootstrap/cache
    depends_on:
      db:
        condition: service_healthy
    networks:
      - haland-network
    restart: unless-stopped

volumes:
  postgres_data:
    driver: local

networks:
  haland-network:
    driver: bridge
